<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Settings - ESP32 DAPLink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .header-top {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 100;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            padding: 0;
            background: rgba(18, 18, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 12px;
            color: rgba(0, 245, 255, 0.8);
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-btn:hover {
            border-color: rgba(0, 245, 255, 0.6);
            color: rgba(0, 245, 255, 1);
            background: rgba(0, 245, 255, 0.1);
        }

        .lang-btn.active {
            background: rgba(0, 245, 255, 0.2);
            border-color: rgba(0, 245, 255, 0.5);
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 2em;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #00f5ff, #7b2cbf, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-card {
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 255, 0.1);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 245, 255, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(0, 245, 255, 0.8);
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 8px;
            color: #ffffff;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: rgba(0, 245, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-reboot {
            width: 100%;
            padding: 15px 30px;
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(123, 44, 191, 0.2));
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 10px;
            color: #ffffff;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 245, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .btn-reboot::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-reboot:hover::before {
            left: 100%;
        }

        .btn-reboot:hover {
            transform: translateY(-3px);
            border-color: rgba(0, 245, 255, 0.5);
            box-shadow: 0 12px 40px rgba(0, 245, 255, 0.2);
        }

        .btn-reboot:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            display: none;
        }

        .message.success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }

        .message.error {
            background: rgba(255, 0, 110, 0.1);
            border: 1px solid rgba(255, 0, 110, 0.3);
            color: #ff006e;
        }

        .back-link {
            margin-top: 20px;
            color: rgba(0, 245, 255, 0.6);
            text-decoration: none;
            font-size: 0.9em;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: rgba(0, 245, 255, 1);
        }
    </style>
</head>

<body>
    <div class="header-top">
        <button class="lang-btn" id="lang-zh" onclick="setLang('zh')">中</button>
        <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
    </div>

    <div class="container">
        <h1>⚙️ <span data-i18n="settings.title">WiFi Settings</span></h1>
        <div class="form-card">
            <div class="form-group">
                <label for="ssid" data-i18n="settings.ssid">WiFi Name (SSID)</label>
                <input type="text" id="ssid" placeholder="" maxlength="31">
            </div>
            <div class="form-group">
                <label for="password" data-i18n="settings.password">Password</label>
                <input type="password" id="password" placeholder="" maxlength="63">
            </div>
            <button class="btn-reboot" id="btn-save" onclick="saveConfig()" data-i18n="settings.save">Save & Reboot</button>
            <div class="message" id="message"></div>
        </div>
        <a class="back-link" href="/" data-i18n="settings.back">Back to Home</a>
    </div>

    <script>
        // i18n translations
        const translations = {
            en: {
                'settings.title': 'WiFi Settings',
                'settings.ssid': 'WiFi Name (SSID)',
                'settings.password': 'Password',
                'settings.save': 'Save & Reboot',
                'settings.back': 'Back to Home',
                'settings.enter_ssid': 'Please enter WiFi name',
                'settings.saving': 'Saving...',
                'settings.success': 'Config saved, device rebooting...',
                'settings.rebooting': 'Rebooting...',
                'settings.failed': 'Save failed: ',
                'settings.error': 'Request failed, check network',
                'settings.ssid_placeholder': 'Enter WiFi name',
                'settings.password_placeholder': 'Enter password (optional)'
            },
            zh: {
                'settings.title': 'WiFi 设置',
                'settings.ssid': 'WiFi 名称 (SSID)',
                'settings.password': '密码 (Password)',
                'settings.save': '保存并重启',
                'settings.back': '返回首页',
                'settings.enter_ssid': '请输入 WiFi 名称',
                'settings.saving': '保存中...',
                'settings.success': '配置已保存，设备正在重启...',
                'settings.rebooting': '重启中...',
                'settings.failed': '保存失败: ',
                'settings.error': '请求失败，请检查网络',
                'settings.ssid_placeholder': '请输入 WiFi 名称',
                'settings.password_placeholder': '请输入密码（可为空）'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.documentElement.lang = lang;
            applyTranslations();
            updateLangButtons();
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang] && translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                }
            });
            document.getElementById('ssid').placeholder = translations[currentLang]['settings.ssid_placeholder'];
            document.getElementById('password').placeholder = translations[currentLang]['settings.password_placeholder'];
        }

        function updateLangButtons() {
            document.getElementById('lang-zh').classList.toggle('active', currentLang === 'zh');
            document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
        }

        function showMessage(text, type) {
            var msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
        }

        function saveConfig() {
            var ssid = document.getElementById('ssid').value.trim();
            var password = document.getElementById('password').value;
            var btn = document.getElementById('btn-save');

            if (!ssid) {
                showMessage(translations[currentLang]['settings.enter_ssid'], 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = translations[currentLang]['settings.saving'];

            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/wifi-set', true);
            xhr.setRequestHeader('Content-Type', 'application/json');

            xhr.onload = function() {
                if (xhr.status === 200) {
                    showMessage(translations[currentLang]['settings.success'], 'success');
                    btn.textContent = translations[currentLang]['settings.rebooting'];
                } else {
                    showMessage(translations[currentLang]['settings.failed'] + xhr.responseText, 'error');
                    btn.disabled = false;
                    btn.textContent = translations[currentLang]['settings.save'];
                }
            };

            xhr.onerror = function() {
                showMessage(translations[currentLang]['settings.error'], 'error');
                btn.disabled = false;
                btn.textContent = translations[currentLang]['settings.save'];
            };

            xhr.send(JSON.stringify({
                ssid: ssid,
                password: password
            }));
        }

        // Init
        document.documentElement.lang = currentLang;
        applyTranslations();
        updateLangButtons();
    </script>
</body>

</html>
