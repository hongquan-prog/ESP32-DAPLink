<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 DAPLink - Web Serial</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #00f5ff;
            --secondary-color: #7b2cbf;
            --accent-color: #ff006e;
            --bg-dark: #0a0a0f;
            --bg-card: #12121a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --success: #00ff88;
            --warning: #ffaa00;
            --error: #ff4444;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, #1a1a2e 50%, var(--bg-dark) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 245, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary-color);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite;
            box-shadow: 0 0 10px var(--primary-color);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .header-top {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 100;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            padding: 0;
            background: rgba(18, 18, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 12px;
            color: rgba(0, 245, 255, 0.8);
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-btn:hover {
            border-color: rgba(0, 245, 255, 0.6);
            color: rgba(0, 245, 255, 1);
            background: rgba(0, 245, 255, 0.1);
        }

        .lang-btn.active {
            background: rgba(0, 245, 255, 0.2);
            border-color: rgba(0, 245, 255, 0.5);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.1em;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(18, 18, 26, 0.8);
            border-radius: 20px;
            border: 1px solid rgba(0, 245, 255, 0.1);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--error);
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: var(--success);
        }

        .status-dot.usb {
            background: var(--primary-color);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .content {
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid rgba(0, 245, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 245, 255, 0.1);
        }

        .control-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        select, input[type="text"] {
            padding: 8px 12px;
            font-size: 0.9em;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 8px;
            color: var(--text-primary);
            min-width: 100px;
            height: 36px;
        }

        select:focus, input[type="text"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 10px rgba(0, 245, 255, 0.2);
        }

        select option {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        /* Unified control element style */
        .ctrl-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 12px;
            font-size: 0.9em;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 245, 255, 0.3);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            height: 36px;
            text-decoration: none;
            white-space: nowrap;
        }

        .ctrl-btn:hover {
            background: rgba(0, 245, 255, 0.15);
            border-color: rgba(0, 245, 255, 0.5);
            color: var(--text-primary);
        }

        .ctrl-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: var(--bg-dark);
        }

        .ctrl-btn.active:hover {
            background: #33f7ff;
        }

        /* Checkbox style */
        .ctrl-btn input[type="checkbox"] {
            display: none;
        }

        .ctrl-btn .checkmark {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 245, 255, 0.5);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .ctrl-btn input[type="checkbox"]:checked + .checkmark {
            background: var(--bg-dark);
            border-color: var(--bg-dark);
        }

        .ctrl-btn .checkmark::after {
            content: '';
            width: 5px;
            height: 9px;
            border: solid var(--primary-color);
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) scale(0);
            transition: transform 0.2s ease;
        }

        .ctrl-btn input[type="checkbox"]:checked + .checkmark::after {
            transform: rotate(45deg) scale(1);
        }

        /* Button style (Clear, Send) */
        .ctrl-btn.btn-action {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border-color: transparent;
            color: var(--text-primary);
            min-width: 90px;
        }

        .ctrl-btn.btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 245, 255, 0.3);
        }

        .ctrl-btn.btn-action:disabled {
            background: #5a6169;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .ctrl-btn.btn-clear {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 245, 255, 0.3);
            color: var(--text-secondary);
        }

        .terminal-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .terminal-section {
                grid-template-columns: 1fr;
            }
        }

        .terminal-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(0, 245, 255, 0.1);
        }

        .terminal-box h3 {
            color: var(--primary-color);
            font-size: 0.9em;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .terminal-box h3 span {
            color: var(--text-secondary);
            font-size: 0.8em;
        }

        .terminal-output {
            width: 100%;
            min-height: 300px;
            max-height: 400px;
            background: rgba(0, 0, 0, 0.5);
            border: none;
            border-radius: 8px;
            padding: 10px;
            color: var(--success);
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            resize: vertical;
            overflow-y: auto;
        }

        .terminal-output:focus {
            outline: none;
        }

        .terminal-controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .stats-bar {
            display: flex;
            justify-content: space-around;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .value {
            font-size: 1.5em;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-item .label {
            font-size: 0.8em;
            color: var(--text-secondary);
        }

        .hex-input-error {
            border-color: var(--error) !important;
            box-shadow: 0 0 10px rgba(255, 68, 68, 0.3) !important;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .footer a {
            color: var(--primary-color);
            text-decoration: none;
        }

        /* Notification banner styles */
        .notification-banner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .notification-banner.warning {
            background: linear-gradient(135deg, rgba(255, 170, 0, 0.2), rgba(255, 170, 0, 0.1));
            border: 1px solid rgba(255, 170, 0, 0.5);
            color: var(--warning);
        }

        .notification-banner.success {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.2), rgba(0, 255, 136, 0.1));
            border: 1px solid rgba(0, 255, 136, 0.5);
            color: var(--success);
        }

        .notification-banner button {
            background: none;
            border: none;
            color: inherit;
            font-size: 1.2em;
            cursor: pointer;
            padding: 0 5px;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .notification-banner button:hover {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .header h1 { font-size: 1.8em; }
            .container { padding: 20px 15px; }
            .content { padding: 20px; }
            .control-bar { flex-direction: column; align-items: stretch; }
            .control-group { justify-content: space-between; }
            .terminal-controls { justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="header-top">
        <button class="lang-btn" id="lang-zh" onclick="setLang('zh')">中</button>
        <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
    </div>

    <div class="container">
        <div class="header">
            <h1 data-i18n="serial.title">Web Serial</h1>
            <p data-i18n="serial.subtitle">ESP32 DAPLink Serial Console</p>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="ws-status"></div>
                <span id="ws-status-text" data-i18n="serial.disconnected">Disconnected</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="serial-mode"></div>
                <span id="serial-mode-text" data-i18n="serial.idle">IDLE</span>
            </div>
        </div>

        <div class="content">
            <div class="control-bar" style="justify-content: space-between;">
                <div class="control-group">
                    <label data-i18n="serial.baudrate">Baudrate:</label>
                    <select id="baudrate-select">
                        <option value="115200">115200</option>
                        <option value="460800">460800</option>
                        <option value="256000">256000</option>
                        <option value="230400">230400</option>
                        <option value="57600">57600</option>
                        <option value="38400">38400</option>
                        <option value="19200">19200</option>
                        <option value="9600">9600</option>
                        <option value="4800">4800</option>
                        <option value="2400">2400</option>
                        <option value="1200">1200</option>
                    </select>
                </div>
                <div class="control-group">
                    <label data-i18n="serial.data_bits">Data Bits:</label>
                    <select id="data-bits-select">
                        <option value="8" selected>8</option>
                        <option value="7">7</option>
                        <option value="6">6</option>
                        <option value="5">5</option>
                    </select>
                </div>
                <div class="control-group">
                    <label data-i18n="serial.parity">Parity:</label>
                    <select id="parity-select">
                        <option value="0" selected data-i18n="serial.parity_none">None</option>
                        <option value="1" data-i18n="serial.parity_odd">Odd</option>
                        <option value="2" data-i18n="serial.parity_even">Even</option>
                    </select>
                </div>
                <div class="control-group">
                    <label data-i18n="serial.stop_bits">Stop Bits:</label>
                    <select id="stop-bits-select">
                        <option value="1" selected>1</option>
                        <option value="2">2</option>
                    </select>
                </div>
                <button class="ctrl-btn btn-action" id="apply-config-btn" data-i18n="serial.apply">Apply</button>
            </div>

            <div class="terminal-section">
                <div class="terminal-box">
                    <h3>
                        <span data-i18n="serial.receive">Receive</span>
                        <span id="rx-hex-indicator" style="display:none;" data-i18n="serial.hex_mode">HEX Mode</span>
                    </h3>
                    <textarea class="terminal-output" id="rx-area" readonly></textarea>
                    <div class="terminal-controls">
                        <label class="ctrl-btn">
                            <input type="checkbox" id="timestamp-checkbox" checked>
                            <span class="checkmark"></span>
                            <span data-i18n="serial.timestamp">Timestamp</span>
                        </label>
                        <label class="ctrl-btn">
                            <input type="checkbox" id="scroll-checkbox" checked>
                            <span class="checkmark"></span>
                            <span data-i18n="serial.auto_scroll">Auto Scroll</span>
                        </label>
                        <label class="ctrl-btn">
                            <input type="checkbox" id="hex-display-checkbox">
                            <span class="checkmark"></span>
                            <span data-i18n="serial.hex_display">HEX Display</span>
                        </label>
                        <div style="flex:1;"></div>
                        <button class="ctrl-btn btn-action" id="clear-btn" data-i18n="serial.clear">Clear</button>
                    </div>
                </div>
                <div class="terminal-box">
                    <h3 data-i18n="serial.send">Send</h3>
                    <textarea class="terminal-output" id="tx-area" placeholder=""></textarea>
                    <div class="terminal-controls">
                        <label class="ctrl-btn">
                            <input type="checkbox" id="hex-send-checkbox">
                            <span class="checkmark"></span>
                            <span data-i18n="serial.hex_mode">HEX Mode</span>
                        </label>
                        <span id="tx-hint" style="color:var(--text-secondary);font-size:0.8em;"></span>
                        <div style="flex:1;"></div>
                        <button class="ctrl-btn btn-action" id="send-btn" disabled data-i18n="serial.send">Send</button>
                    </div>
                </div>
            </div>

            <div class="stats-bar">
                <div class="stat-item">
                    <div class="value" id="rx-bytes">0</div>
                    <div class="label" data-i18n="serial.rx_bytes">RX Bytes</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="tx-bytes">0</div>
                    <div class="label" data-i18n="serial.tx_bytes">TX Bytes</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="rx-packets">0</div>
                    <div class="label" data-i18n="serial.rx_packets">RX Packets</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="tx-packets">0</div>
                    <div class="label" data-i18n="serial.tx_packets">TX Packets</div>
                </div>
            </div>
        </div>

        <div class="footer">
            Powered by <a href="/">ESP32 DAPLink</a>
        </div>
    </div>

    <script>
        // i18n translations
        const translations = {
            en: {
                'serial.title': 'Web Serial',
                'serial.subtitle': 'ESP32 DAPLink Serial Console',
                'serial.disconnected': 'Disconnected',
                'serial.connected': 'Connected',
                'serial.idle': 'IDLE',
                'serial.usb': 'USB',
                'serial.web': 'WEB',
                'serial.baudrate': 'Baudrate:',
                'serial.data_bits': 'Data Bits:',
                'serial.parity': 'Parity:',
                'serial.parity_none': 'None',
                'serial.parity_odd': 'Odd',
                'serial.parity_even': 'Even',
                'serial.stop_bits': 'Stop Bits:',
                'serial.apply': 'Apply',
                'serial.receive': 'Receive',
                'serial.send': 'Send',
                'serial.timestamp': 'Timestamp',
                'serial.auto_scroll': 'Auto Scroll',
                'serial.hex_display': 'HEX Display',
                'serial.hex_mode': 'HEX Mode',
                'serial.clear': 'Clear',
                'serial.rx_bytes': 'RX Bytes',
                'serial.tx_bytes': 'TX Bytes',
                'serial.rx_packets': 'RX Packets',
                'serial.tx_packets': 'TX Packets',
                'serial.hex_hint': '(e.g., 01 02 0A FF)',
                'serial.tx_placeholder': 'Enter text to send...',
                'serial.tx_hex_placeholder': 'Enter hex bytes (e.g., 01 02 0A FF)...',
                'serial.connected_msg': '[WebSerial] Connected',
                'serial.usb_transfer': 'Serial link transferred to USB. Web serial is now paused.',
                'serial.web_available': 'Serial link is now available for Web.',
                'serial.link_usb': 'Serial link transferred to USB',
                'serial.link_web': 'Serial link is now available'
            },
            zh: {
                'serial.title': 'Web 串口',
                'serial.subtitle': 'ESP32 DAPLink 串口控制台',
                'serial.disconnected': '未连接',
                'serial.connected': '已连接',
                'serial.idle': '空闲',
                'serial.usb': 'USB',
                'serial.web': '网络',
                'serial.baudrate': '波特率:',
                'serial.data_bits': '数据位:',
                'serial.parity': '校验:',
                'serial.parity_none': '无',
                'serial.parity_odd': '奇',
                'serial.parity_even': '偶',
                'serial.stop_bits': '停止位:',
                'serial.apply': '应用',
                'serial.receive': '接收',
                'serial.send': '发送',
                'serial.timestamp': '时间戳',
                'serial.auto_scroll': '自动滚动',
                'serial.hex_display': 'HEX 显示',
                'serial.hex_mode': 'HEX 模式',
                'serial.clear': '清除',
                'serial.rx_bytes': 'RX 字节',
                'serial.tx_bytes': 'TX 字节',
                'serial.rx_packets': 'RX 包',
                'serial.tx_packets': 'TX 包',
                'serial.hex_hint': '(例如: 01 02 0A FF)',
                'serial.tx_placeholder': '输入要发送的文本...',
                'serial.tx_hex_placeholder': '输入十六进制字节 (例如: 01 02 0A FF)...',
                'serial.connected_msg': '[WebSerial] 已连接',
                'serial.usb_transfer': '串口已切换到 USB，Web 串口暂停',
                'serial.web_available': '串口现在可用于 Web',
                'serial.link_usb': '串口已切换到 USB',
                'serial.link_web': '串口已可用'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';
        let t = (key) => translations[currentLang] && translations[currentLang][key] || key;

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.documentElement.lang = lang;
            applyTranslations();
            updateLangButtons();
            updatePlaceholders();
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang] && translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                }
            });
        }

        function updateLangButtons() {
            document.getElementById('lang-zh').classList.toggle('active', currentLang === 'zh');
            document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
        }

        function updatePlaceholders() {
            txArea.placeholder = enableHexSend ? t('serial.tx_hex_placeholder') : t('serial.tx_placeholder');
            txHint.textContent = enableHexSend ? t('serial.hex_hint') : '';
        }

        // Particle animation
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }

        // State variables
        let websocket = null;
        let enableTimestamp = true;
        let enableAutoScroll = true;
        let enableHexDisplay = false;
        let enableHexSend = false;
        let rxBytes = 0;
        let txBytes = 0;
        let rxPackets = 0;
        let txPackets = 0;
        let cache = '';
        let timeoutId = null;

        // Reusable encoder for hex display
        const textEncoder = new TextEncoder();

        // DOM elements
        const wsStatus = document.getElementById('ws-status');
        const wsStatusText = document.getElementById('ws-status-text');
        const serialMode = document.getElementById('serial-mode');
        const serialModeText = document.getElementById('serial-mode-text');
        const rxArea = document.getElementById('rx-area');
        const txArea = document.getElementById('tx-area');
        const sendBtn = document.getElementById('send-btn');
        const baudrateSelect = document.getElementById('baudrate-select');
        const timestampCheckbox = document.getElementById('timestamp-checkbox');
        const scrollCheckbox = document.getElementById('scroll-checkbox');
        const hexDisplayCheckbox = document.getElementById('hex-display-checkbox');
        const hexSendCheckbox = document.getElementById('hex-send-checkbox');
        const clearBtn = document.getElementById('clear-btn');
        const rxBytesEl = document.getElementById('rx-bytes');
        const txBytesEl = document.getElementById('tx-bytes');
        const rxPacketsEl = document.getElementById('rx-packets');
        const txPacketsEl = document.getElementById('tx-packets');
        const rxHexIndicator = document.getElementById('rx-hex-indicator');
        const txHint = document.getElementById('tx-hint');
        const dataBitsSelect = document.getElementById('data-bits-select');
        const paritySelect = document.getElementById('parity-select');
        const stopBitsSelect = document.getElementById('stop-bits-select');
        const applyConfigBtn = document.getElementById('apply-config-btn');

        // WebSocket connection
        function initWebSocket() {
            console.log('Connecting to WebSocket...');
            websocket = new WebSocket('ws://' + location.hostname + ':80/webserial_socket');

            websocket.onopen = function() {
                console.log('WebSocket connected');
                wsStatus.classList.add('connected');
                wsStatusText.textContent = t('serial.connected');
                serialMode.classList.add('connected');
                serialModeText.textContent = t('serial.web');
                sendBtn.disabled = false;
                rxArea.value = t('serial.connected_msg') + '\n';
            };

            websocket.onclose = function() {
                console.log('WebSocket disconnected');
                wsStatus.classList.remove('connected');
                wsStatusText.textContent = t('serial.disconnected');
                serialMode.classList.remove('connected', 'usb');
                serialModeText.textContent = t('serial.idle');
                sendBtn.disabled = true;
                setTimeout(initWebSocket, 2000);
            };

            websocket.onerror = function(error) {
                console.error('WebSocket error:', error);
            };

            websocket.onmessage = function(event) {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'state_change') {
                        handleStateChange(msg.state);
                        return;
                    }
                } catch (e) {
                }
                handleReceivedData(event.data);
            };
        }

        // Handle state change notification from server
        function handleStateChange(state) {
            console.log('Serial state changed to:', state);

            if (state === 'USB') {
                serialMode.classList.add('usb');
                serialMode.classList.remove('connected');
                serialModeText.textContent = t('serial.usb');
                showNotification(t('serial.link_usb'), 'warning');
                appendToRx('\n[System] ' + t('serial.usb_transfer') + '\n');
                sendBtn.disabled = true;
            } else if (state === 'WEB') {
                serialMode.classList.remove('usb');
                serialMode.classList.add('connected');
                serialModeText.textContent = t('serial.web');
                showNotification(t('serial.link_web'), 'success');
                appendToRx('\n[System] ' + t('serial.web_available') + '\n');
                sendBtn.disabled = false;
            } else if (state === 'IDLE') {
                serialMode.classList.remove('connected', 'usb');
                serialModeText.textContent = t('serial.idle');
                sendBtn.disabled = true;
            }
        }

        // Show notification banner
        function showNotification(message, type) {
            const existing = document.querySelector('.notification-banner');
            if (existing) {
                existing.remove();
            }

            const notification = document.createElement('div');
            notification.className = 'notification-banner ' + type;
            notification.innerHTML = '<span>' + message + '</span><button onclick="this.parentElement.remove()">&times;</button>';

            const statusBar = document.querySelector('.status-bar');
            statusBar.parentNode.insertBefore(notification, statusBar.nextSibling);

            setTimeout(function() {
                if (notification.parentElement) {
                    notification.remove();
                }
            }, 5000);
        }

        // Handle received data
        function handleReceivedData(data) {
            rxBytes += data.length;
            rxPackets++;
            updateStats();

            if (enableHexDisplay) {
                const hexStr = Array.from(textEncoder.encode(data))
                    .map(b => b.toString(16).toUpperCase().padStart(2, '0'))
                    .join(' ');
                appendToRx(hexStr + ' ');
            } else {
                if (enableTimestamp) {
                    cache += data;
                    processCache();
                } else {
                    appendToRx(data);
                }
            }
        }

        // Process cache for timestamp
        function processCache() {
            if (cache.includes('\n')) {
                let lines = cache.split('\n');
                cache = lines.pop();
                lines.forEach(line => {
                    if (line.trim() !== '') {
                        appendToRxWithTimestamp(line);
                    }
                });
            }
            if (cache !== '') {
                clearTimeout(timeoutId);
                timeoutId = setTimeout(() => {
                    if (cache.trim() !== '') {
                        appendToRxWithTimestamp(cache);
                    }
                    cache = '';
                }, 100);
            }
        }

        // Append to RX area with timestamp
        function appendToRxWithTimestamp(text) {
            const now = new Date();
            const timestamp = '[' + now.toLocaleTimeString() + '.' + now.getMilliseconds().toString().padStart(3, '0') + '] ';
            appendToRx(timestamp + text + '\n');
        }

        // Append to RX area
        function appendToRx(text) {
            rxArea.value += text;
            if (enableAutoScroll) {
                rxArea.scrollTop = rxArea.scrollHeight;
            }
        }

        // Update statistics
        function updateStats() {
            rxBytesEl.textContent = rxBytes.toLocaleString();
            txBytesEl.textContent = txBytes.toLocaleString();
            rxPacketsEl.textContent = rxPackets.toLocaleString();
            txPacketsEl.textContent = txPackets.toLocaleString();
        }

        // Send data
        function sendData() {
            const text = txArea.value;
            if (!text || !websocket || websocket.readyState !== WebSocket.OPEN) return;

            let data;
            if (enableHexSend) {
                const hexBytes = text.trim().split(/\s+/);
                const bytes = [];
                for (const hex of hexBytes) {
                    if (hex.length === 0) continue;
                    if (!/^[0-9A-Fa-f]{2}$/.test(hex)) {
                        txArea.classList.add('hex-input-error');
                        setTimeout(() => txArea.classList.remove('hex-input-error'), 1000);
                        return;
                    }
                    bytes.push(parseInt(hex, 16));
                }
                data = new Uint8Array(bytes);
                websocket.send(data);
                txBytes += data.length;
            } else {
                websocket.send(text);
                txBytes += text.length;
            }

            txPackets++;
            updateStats();
            txArea.value = '';
        }

        // Event listeners
        sendBtn.addEventListener('click', sendData);

        txArea.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendData();
            }
        });

        applyConfigBtn.addEventListener('click', function() {
            const baudrate = parseInt(baudrateSelect.value);
            const dataBits = parseInt(dataBitsSelect.value);
            const parity = parseInt(paritySelect.value);
            const stopBits = parseInt(stopBitsSelect.value);
            fetch('/api/set-uart-config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    baudrate: baudrate,
                    data_bits: dataBits,
                    parity: parity,
                    stop_bits: stopBits
                })
            }).then(response => {
                if (response.ok) {
                    console.log('UART config applied');
                }
            });
        });

        timestampCheckbox.addEventListener('change', function() {
            enableTimestamp = this.checked;
        });

        scrollCheckbox.addEventListener('change', function() {
            enableAutoScroll = this.checked;
        });

        hexDisplayCheckbox.addEventListener('change', function() {
            enableHexDisplay = this.checked;
            rxHexIndicator.style.display = enableHexDisplay ? 'inline' : 'none';
        });

        hexSendCheckbox.addEventListener('change', function() {
            enableHexSend = this.checked;
            updatePlaceholders();
        });

        clearBtn.addEventListener('click', function() {
            rxArea.value = '';
            rxBytes = 0;
            txBytes = 0;
            rxPackets = 0;
            txPackets = 0;
            updateStats();
        });

        // Initialize
        document.documentElement.lang = currentLang;
        applyTranslations();
        updateLangButtons();
        updatePlaceholders();
        createParticles();
        initWebSocket();
    </script>
</body>
</html>
