<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 DAPLink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 40px;
            background: linear-gradient(90deg, #00f5ff, #7b2cbf, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 10px;
        }

        .nav-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 15px;
            min-height: 100px;
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 255, 0.1);
            border-radius: 15px;
            text-decoration: none;
            color: #ffffff;
            text-align: center;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 245, 255, 0.1);
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .nav-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .nav-button:hover::before {
            left: 100%;
        }

        .nav-button:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 245, 255, 0.5);
            box-shadow: 0 12px 40px rgba(0, 245, 255, 0.2);
        }

        .nav-button .icon {
            font-size: 2em;
            display: block;
            margin-bottom: 10px;
        }

        .nav-button.primary {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(123, 44, 191, 0.2));
            border-color: rgba(0, 245, 255, 0.3);
        }

        .header {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 100;
        }

        .lang-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            padding: 0;
            background: rgba(18, 18, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 12px;
            color: rgba(0, 245, 255, 0.8);
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .lang-btn:hover {
            border-color: rgba(0, 245, 255, 0.6);
            color: rgba(0, 245, 255, 1);
            background: rgba(0, 245, 255, 0.1);
        }

        .lang-btn.active {
            background: rgba(0, 245, 255, 0.2);
            border-color: rgba(0, 245, 255, 0.5);
        }

        .settings-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 44px;
            height: 44px;
            padding: 0;
            background: rgba(18, 18, 26, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 12px;
            text-decoration: none;
            color: rgba(0, 245, 255, 0.8);
            font-size: 1.2em;
            transition: all 0.3s ease;
        }

        .settings-btn:hover {
            border-color: rgba(0, 245, 255, 0.6);
            color: rgba(0, 245, 255, 1);
            background: rgba(0, 245, 255, 0.1);
        }

        /* Mobile adjustments */
        @media (max-width: 480px) {
            .container {
                padding: 60px 10px 30px;
            }

            h1 {
                font-size: 1.8em;
                margin-bottom: 25px;
            }

            .nav-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .nav-button {
                flex-direction: row;
                min-height: 60px;
                padding: 15px 20px;
                font-size: 1.1em;
            }

            .nav-button .icon {
                font-size: 1.5em;
                margin-bottom: 0;
                margin-right: 15px;
            }
        }

        /* Tablet */
        @media (min-width: 481px) and (max-width: 768px) {
            .nav-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="header">
        <button class="lang-btn" id="lang-zh" onclick="setLang('zh')">中</button>
        <button class="lang-btn" id="lang-en" onclick="setLang('en')">EN</button>
        <a class="settings-btn" href="/settings">⚙️</a>
    </div>
    <div class="container">
        <h1>⚡ ESP32 DAPLink</h1>
        <div class="nav-grid">
            <a class="nav-button primary" href="/upgrade">
                <span class="icon">🚀</span>
                <span data-i18n="nav.upgrade">Firmware Upgrade</span>
            </a>
            <a class="nav-button" href="/program">
                <span class="icon">💾</span>
                <span data-i18n="nav.program">Program</span>
            </a>
            <a class="nav-button" href="/webserial">
                <span class="icon">📟</span>
                <span data-i18n="nav.serial">Web Serial</span>
            </a>
        </div>
    </div>

    <script>
        // i18n translations
        const translations = {
            en: {
                'nav.upgrade': 'Firmware Upgrade',
                'nav.program': 'Program',
                'nav.serial': 'Web Serial'
            },
            zh: {
                'nav.upgrade': '固件升级',
                'nav.program': '烧录程序',
                'nav.serial': 'Web 串口'
            }
        };

        let currentLang = localStorage.getItem('lang') || 'en';

        function setLang(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.documentElement.lang = lang;
            applyTranslations();
            updateLangButtons();
        }

        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (translations[currentLang] && translations[currentLang][key]) {
                    el.textContent = translations[currentLang][key];
                }
            });
        }

        function updateLangButtons() {
            document.getElementById('lang-zh').classList.toggle('active', currentLang === 'zh');
            document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');
        }

        // Init
        document.documentElement.lang = currentLang;
        applyTranslations();
        updateLangButtons();
    </script>
</body>

</html>
