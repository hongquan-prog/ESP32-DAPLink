<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 DAPLink</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0a0a0f 100%);
            min-height: 100vh;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 3em;
            margin-bottom: 40px;
            background: linear-gradient(90deg, #00f5ff, #7b2cbf, #ff006e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 245, 255, 0.3);
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .nav-button {
            display: block;
            padding: 25px 30px;
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 245, 255, 0.1);
            border-radius: 15px;
            text-decoration: none;
            color: #ffffff;
            text-align: center;
            font-size: 1.2em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 245, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .nav-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .nav-button:hover::before {
            left: 100%;
        }

        .nav-button:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 245, 255, 0.5);
            box-shadow: 0 12px 40px rgba(0, 245, 255, 0.2);
        }

        .nav-button .icon {
            font-size: 2em;
            display: block;
            margin-bottom: 10px;
        }

        .nav-button.primary {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(123, 44, 191, 0.2));
            border-color: rgba(0, 245, 255, 0.3);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>⚡ ESP32 DAPLink</h1>
        <div class="nav-grid">
            <a class="nav-button primary" href="/upgrade">
                <span class="icon">🚀</span>
                固件升级
            </a>
            <a class="nav-button" href="/program">
                <span class="icon">💾</span>
                烧录程序
            </a>
            <a class="nav-button" href="/webserial">
                <span class="icon">📟</span>
                Web 串口
            </a>
        </div>
    </div>
</body>

</html>
